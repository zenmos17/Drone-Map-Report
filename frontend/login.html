<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ - แผนที่รายงานโดรน</title>
    <link rel="stylesheet" href="css/login.css" />
    <link rel="icon" type="image/png" href="img//logo/logo.png">
</head>
<body>
  <div class="login-container">
    <div class="login-icon">🔐</div>
    <h1 class="login-title">เข้าสู่ระบบ</h1>
    <p class="login-subtitle">ผู้ดูแลระบบ</p>

    <div id="message" class="message"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">ชื่อผู้ใช้</label>
        <input 
          type="text" 
          id="username" 
          name="username" 
          placeholder="ป้อนชื่อผู้ใช้"
          required
        >
      </div>

      <div class="form-group">
        <label for="password">รหัสผ่าน</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          placeholder="ป้อนรหัสผ่าน"
          required
        >
      </div>

      <button type="submit" class="login-button">เข้าสู่ระบบ</button>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <span>กำลังเข้าสู่ระบบ...</span>
      </div>
    </form>

    <div class="login-info" style="display: none;">
      <p>🔑 ชื่อผู้ใช้: <strong>admin</strong></p>
      <p>🔐 รหัสผ่าน: <strong>admin</strong></p>
    </div>
  </div>

    <script src="js/login.js"></script>
</body>
</html>
